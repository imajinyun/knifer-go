# Codecov configuration for go-knifer.
#
# Values are kept in sync with bin/check_coverage.sh.

codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: false

coverage:
  precision: 1
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: 75.2%
        threshold: 0.5%
        base: auto
        branches:
          - main
    patch:
      default:
        target: 60%
        base: auto
        informational: true
    changes: false

flag_management:
  default_rules:
    carryforward: true

flags:
  root:
    paths:
      - "*.go"
  vhttp:
    paths:
      - vhttp/
      - internal/httpx/http/
  vresty:
    paths:
      - vresty/
      - internal/httpx/resty/
  vconf:
    paths:
      - vconf/
      - internal/conf/
  vcrypto:
