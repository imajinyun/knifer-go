version: "2"

linters:
  default: standard
  enable:
    - cyclop
    - errcheck
    - gocritic
    - gosec
    - ineffassign
    - misspell
    - prealloc
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    cyclop:
      max-complexity: 40
    staticcheck:
      # SA5012 panics on generic variadic forwarding (staticcheck v0.7.0 bug:
      # "can't set facts on objects belonging another package"). Our vmap.Of
      # forwards to internal/maps.Of, which is correct; disable the broken check.
      # ST1003 flags initialisms (Id/Ascii/Ip) in public API names that are kept
      # intentionally stable; disable it to avoid breaking exported identifiers.
      checks:
        - all
        - -SA5012
        - -ST1003
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - errcheck
          - gosec
      - path: internal/(hash|crypto)/.*\.go
        linters:
          - gosec
        text: "weak cryptographic primitive"
      - path: internal/(bloomfilter|captcha|conv|crypto|id|json|rand)/.*\.go
        linters:
          - gosec
        text: "integer overflow conversion"
      - path: internal/(rand/rand|id/id)\.go
        linters:
          - gosec
        text: "weak random number generator"
      - path: internal/(file/file|bloomfilter/bitset_bloomfilter|extra/extra)\.go
        linters:
          - gosec
        text: "Potential file inclusion via variable"
      - path: internal/(http/response|conf/conf)\.go
        linters:
          - gosec
        text: "Potential file inclusion via variable"
      - path: internal/jwt/signer_async\.go
        linters:
          - gosec
        text: "weak cryptographic primitive"
      - path: internal/http/request\.go
        linters:
          - gosec
        text: "InsecureSkipVerify"
      - path: internal/(file/file|captcha/captcha|extra/extra)\.go
        linters:
          - gosec
        text: "Expect .* permissions"
      - path: internal/extra/extra\.go
        linters:
          - gosec
        text: "File traversal when extracting zip/tar archive"
      - path: internal/extra/extra\.go
        linters:
          - gosec
        text: "Potential DoS vulnerability via decompression bomb"

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
