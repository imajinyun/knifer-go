# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: go-knifer-ci

env:
  GOLANGCI_LINT_VERSION: v2.12.2
  GO_1_25_PATCH_VERSION: "1.25.11"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  agent-governance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select change policy base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "AGENT_CHANGE_BASE_REF=origin/${{ github.base_ref }}" >> "${GITHUB_ENV}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "AGENT_CHANGE_BASE_REF=${{ github.event.before }}" >> "${GITHUB_ENV}"
          fi

      - name: Run Agent governance workflow
        env:
          AGENT_EVIDENCE_FILE: go-knifer-agent-validation.json
        run: make ci-agent-governance

      - name: Upload Agent validation evidence
        uses: actions/upload-artifact@v7
        with:
          name: agent-validation-evidence
          path: go-knifer-agent-validation.json

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25.11", "1.26"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run CI test gates
        run: make ci-test COVERAGE_FILE=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_1_25_PATCH_VERSION }}
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run lint gate
        run: make lint

  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_1_25_PATCH_VERSION }}
          cache: true

      - name: Run vulnerability gate
        run: make govulncheck

  benchmark-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_1_25_PATCH_VERSION }}
          cache: true

      - name: Run benchmark smoke gate
        run: make bench-smoke

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
