# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: go-knifer-ci

env:
  GOLANGCI_LINT_VERSION: v2.12.2
  GO_1_25_PATCH_VERSION: "1.25.11"
  COVERAGE_THRESHOLD: "73.5"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25.11", "1.26"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify module checksums
        run: make mod-verify

      - name: Vet
        run: make vet

      - name: Check go mod tidy
        run: make tidy-check

      - name: Check generated diffs and whitespace
        run: make diff-check

      - name: Architecture check
        run: make arch

      - name: Test
        run: make test-race

      - name: Check coverage threshold
        run: make coverage-check

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_1_25_PATCH_VERSION }}
      - uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_1_25_PATCH_VERSION }}
          cache: true

      - name: Check govulncheck tool
        run: go tool govulncheck -version

      - name: Run govulncheck
        run: go tool govulncheck ./...

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
