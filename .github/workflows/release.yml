name: go-knifer-release

env:
  GO_1_25_PATCH_VERSION: "1.25.11"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_1_25_PATCH_VERSION }}
          cache: true

      - name: Verify tag matches module version format
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "release tag must look like vMAJOR.MINOR.PATCH: ${GITHUB_REF_NAME}" >&2; exit 1 ;;
          esac

      - name: Verify changelog contains release notes
        shell: bash
        run: make release-notes-check RELEASE_VERSION="${GITHUB_REF_NAME#v}"

      - name: Verify release gates
        run: make release-check COVERAGE_FILE=/tmp/go-knifer-release-coverage.out

      - name: Verify v1 governance maturity gates
        run: |
          make governance-maturity-check
          make bench-regression-check

      - name: Verify benchmark smoke gate
        run: make bench-smoke

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
